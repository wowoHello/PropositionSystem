<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWT 命題工作平臺 - 重設密碼</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link href="css/sweetalert2.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/resetpassword.css">
</head>

<body>
    <div class="d-flex align-items-center justify-content-center min-vh-100 p-4">
        <div class="login-container" style="max-width: 480px; width: 100%;">
            <div class="login-card p-5" id="resetCard">
                <div class="text-center mb-4" style="position: relative;">
                    <a href="index.html" class="back-to-login" title="返回登入頁面">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                        </svg>
                    </a>
                    <div class="page-icon">
                        <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                        </svg>
                    </div>
                    <h1 class="logo-title fs-4 fw-bold mb-2">設定新密碼</h1>
                    <p class="text-secondary" style="font-size: 0.9rem; line-height: 1.6;">
                        密碼至少 8 個字元，<br>建議包含大小寫字母與數字以提高安全性。
                    </p>
                </div>

                <!-- Token 驗證資訊（DEMO 用） -->
                <div class="token-info" id="tokenInfo">
                    <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z"
                            clip-rule="evenodd" />
                    </svg>
                    <span>Token 驗證成功 — 帳號：<strong id="emailDisplay"></strong></span>
                </div>

                <form id="resetForm">
                    <div class="mb-3 form-group">
                        <label class="form-label fw-medium text-secondary small" for="newPassword">
                            新密碼<span class="text-danger">*</span>
                        </label>
                        <div class="position-relative">
                            <input type="password" id="newPassword" class="form-control" placeholder="請輸入新密碼"
                                autocomplete="new-password" required>
                            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                            <svg class="password-toggle" id="toggleNewPw" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24" width="20" height="20">
                                <path class="eye-closed" stroke-linecap="round" stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </div>
                        <!-- 密碼強度條 -->
                        <div class="strength-bar">
                            <div class="strength-track">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <span class="strength-label" id="strengthLabel"></span>
                        </div>
                        <div class="invalid-feedback d-none" id="newPwError">請輸入新密碼</div>
                    </div>

                    <div class="mb-4 form-group">
                        <label class="form-label fw-medium text-secondary small" for="confirmPassword">
                            確認新密碼<span class="text-danger">*</span>
                        </label>
                        <div class="position-relative">
                            <input type="password" id="confirmPassword" class="form-control" placeholder="請再次輸入新密碼"
                                autocomplete="new-password" required>
                            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                            </svg>
                            <svg class="password-toggle" id="toggleConfirmPw" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24" width="20" height="20">
                                <path class="eye-closed" stroke-linecap="round" stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </div>
                        <!-- 密碼比對即時提示 -->
                        <div class="pw-match-hint" id="pwMatchHint"></div>
                        <div class="invalid-feedback d-none" id="confirmPwError">請再次輸入新密碼</div>
                    </div>

                    <button type="submit" class="btn btn-login w-100 submit-btn" id="btnResetPw">
                        <span class="btn-text">確認變更密碼</span>
                        <span class="btn-loading d-none">
                            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                            處理中...
                        </span>
                    </button>

                    <div class="text-center mt-3 footer-links">
                        <a href="index.html" class="footer-link">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                stroke-width="2" style="vertical-align: -2px; margin-right: 4px;">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" />
                            </svg>返回登入
                        </a>
                    </div>
                </form>
            </div>

            <div class="mt-4 p-3 bg-light rounded-4 text-center text-secondary small security-notice"
                style="background-color: rgba(255,255,255,0.6) !important;">
                本系統採用 SSL 加密傳輸，保障資料安全。請勿於公共電腦使用本系統，並定期更換密碼以確保資訊安全。
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/sweetalert2.min.js"></script>
    <script>
        // ============================================================
        // 重設密碼頁面邏輯
        // ============================================================

        const newPwInput = document.getElementById('newPassword');
        const confirmPwInput = document.getElementById('confirmPassword');
        const strengthFill = document.getElementById('strengthFill');
        const strengthLabel = document.getElementById('strengthLabel');
        const pwMatchHint = document.getElementById('pwMatchHint');
        const resetForm = document.getElementById('resetForm');
        const btnResetPw = document.getElementById('btnResetPw');

        // 從 URL 取得 token 與 email（DEMO 用）
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email') || '';

        // 顯示帳號資訊
        if (email) {
            document.getElementById('emailDisplay').textContent = email;
            document.getElementById('tokenInfo').style.display = 'flex';
        } else {
            document.getElementById('tokenInfo').style.display = 'none';
        }

        // Token 不存在時的防呆處理
        if (!token) {
            Swal.fire({
                title: '連結無效',
                text: '此密碼重設連結已失效或不正確，請重新申請。',
                icon: 'error',
                confirmButtonText: '重新申請',
                confirmButtonColor: '#3b82f6',
                allowOutsideClick: false,
                allowEscapeKey: false,
            }).then(() => {
                window.location.href = 'forgotpassword.html';
            });
        }

        // 密碼強度檢測
        function getPasswordStrength(pw) {
            let score = 0;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
            if (/\d/.test(pw)) score++;
            if (/[^a-zA-Z0-9]/.test(pw)) score++;
            if (score <= 1) return { label: '弱', color: '#ef4444', width: '25%' };
            if (score <= 2) return { label: '普通', color: '#f59e0b', width: '50%' };
            if (score <= 3) return { label: '良好', color: '#3b82f6', width: '75%' };
            return { label: '強', color: '#10b981', width: '100%' };
        }

        // 密碼強度即時偵測
        newPwInput.addEventListener('input', () => {
            newPwInput.classList.remove('is-invalid');
            document.getElementById('newPwError').classList.add('d-none');
            const val = newPwInput.value;
            if (!val) {
                strengthFill.style.width = '0%';
                strengthLabel.textContent = '';
                return;
            }
            const s = getPasswordStrength(val);
            strengthFill.style.width = s.width;
            strengthFill.style.backgroundColor = s.color;
            strengthLabel.textContent = s.label;
            strengthLabel.style.color = s.color;
            // 連動更新比對
            if (confirmPwInput.value) checkMatch();
        });

        // 確認密碼即時比對
        function checkMatch() {
            confirmPwInput.classList.remove('is-invalid');
            document.getElementById('confirmPwError').classList.add('d-none');
            const pw = newPwInput.value;
            const cpw = confirmPwInput.value;
            if (!cpw) { pwMatchHint.innerHTML = ''; return; }
            if (cpw === pw) {
                pwMatchHint.innerHTML = `<svg width="14" height="14" fill="#10b981" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg> 密碼一致`;
                pwMatchHint.style.color = '#10b981';
            } else {
                pwMatchHint.innerHTML = `<svg width="14" height="14" fill="#ef4444" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg> 密碼不一致`;
                pwMatchHint.style.color = '#ef4444';
            }
        }
        confirmPwInput.addEventListener('input', checkMatch);

        // 密碼顯示/隱藏
        function togglePassword(btnId, inputEl) {
            document.getElementById(btnId).addEventListener('click', function () {
                const type = inputEl.type === 'password' ? 'text' : 'password';
                inputEl.type = type;
                if (type === 'text') {
                    this.innerHTML = `<path class="eye-open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path class="eye-open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
                } else {
                    this.innerHTML = `<path class="eye-closed" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
                }
            });
        }
        togglePassword('toggleNewPw', newPwInput);
        togglePassword('toggleConfirmPw', confirmPwInput);

        // 表單提交
        resetForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const pw = newPwInput.value;
            const cpw = confirmPwInput.value;
            let valid = true;

            // 新密碼驗證
            if (!pw) {
                newPwInput.classList.add('is-invalid');
                document.getElementById('newPwError').classList.remove('d-none');
                document.getElementById('newPwError').textContent = '請輸入新密碼';
                valid = false;
            } else if (pw.length < 8) {
                newPwInput.classList.add('is-invalid');
                document.getElementById('newPwError').classList.remove('d-none');
                document.getElementById('newPwError').textContent = '密碼長度至少 8 個字元';
                valid = false;
            }

            // 確認密碼驗證
            if (!cpw) {
                confirmPwInput.classList.add('is-invalid');
                document.getElementById('confirmPwError').classList.remove('d-none');
                document.getElementById('confirmPwError').textContent = '請再次輸入新密碼';
                valid = false;
            } else if (pw && cpw !== pw) {
                confirmPwInput.classList.add('is-invalid');
                document.getElementById('confirmPwError').classList.remove('d-none');
                document.getElementById('confirmPwError').textContent = '兩次密碼輸入不一致';
                valid = false;
            }

            // DEMO：模擬「新密碼不可與原密碼相同」
            if (valid && pw === 'password123') {
                newPwInput.classList.add('is-invalid');
                document.getElementById('newPwError').classList.remove('d-none');
                document.getElementById('newPwError').textContent = '新密碼不可與原密碼相同';
                valid = false;
            }

            if (!valid) return;

            // 顯示 loading
            const btnText = btnResetPw.querySelector('.btn-text');
            const btnLoading = btnResetPw.querySelector('.btn-loading');
            btnText.classList.add('d-none');
            btnLoading.classList.remove('d-none');
            btnResetPw.disabled = true;

            // 模擬 API 延遲
            setTimeout(() => {
                Swal.fire({
                    title: '密碼變更成功',
                    text: '請使用新密碼重新登入系統。',
                    icon: 'success',
                    confirmButtonText: '前往登入',
                    confirmButtonColor: '#3b82f6',
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                }).then(() => {
                    window.location.href = 'index.html';
                });
            }, 1200);
        });
    </script>
</body>

</html>
